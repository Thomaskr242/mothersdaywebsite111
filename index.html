<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="index.html">For Mom</a>
            <span class="nav-note">Mother's Day</span>
        </nav>
        <section class="hero">
            <div class="hero-copy">
                <h1>Happy Mother's Day, Mom</h1>
                <p>
                    I made this little page for you because you deserve something sweet,
                    bright, and full of love.
                </p>
            </div>
        </section>
    </header>

    <main>
        <section class="gallery" aria-label="Mother's Day memories">
            <a class="memory-card" href="messages/love.html">
                <img src="assets/images/mom-birthday.jpg" alt="Mom and Thomas smiling together outside at night">
                <span>For the way you love</span>
            </a>

            <a class="memory-card" href="messages/strength.html">
                <img src="assets/images/mom-party.jpg" alt="Mom kissing Thomas on the cheek in front of purple and gold balloons">
                <span>For your strength</span>
            </a>

            <a class="memory-card" href="messages/joy.html">
                <img src="assets/images/mom-family.jpg" alt="Family selfie on a couch">
                <span>For the joy you bring</span>
            </a>

            <a class="memory-card" href="messages/thanks.html">
                <img src="assets/images/mom-formal.jpg" alt="Mom and Thomas dressed up together">
                <span>For everything you do</span>
            </a>

            <a class="memory-card" href="messages/memories.html">
                <img src="assets/images/mom-memory.jpg" alt="A favorite memory with Mom">
                <span>For our memories</span>
            </a>
        </section>
    </main>
</body>
</html>
